  namespace: network-system
  labels:
    app.kubernetes.io/instance: adguard
    app.kubernetes.io/name: adguard-home
  annotations:
    # cni.projectcalico.org/ipAddrs: '["10.0.100.3"]'
    # traefik.ingress.kubernetes.io/service.nativelb: "true"
    # metallb.io/loadBalancerIPs: 10.0.100.3
    # metallb.io/allow-shared-ip: "adguard-share"
    # metallb.io/address-pool: system
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
    # traefik.ingress.kubernetes.io/service.serversscheme: https
    # traefik.ingress.kubernetes.io/service.serverstransport: network-system-skipverify@kubernetescrd
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: adguard-home
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httpOnly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.sameSite: "none"
    traefik.ingress.kubernetes.io/service.sticky.cookie.maxAge: "3600"
    traefik.ingress.kubernetes.io/service.sticky.cookie.path: /dns-query
spec:
  type: ClusterIP
  # externalTrafficPolicy: Cluster
  # externalIPs:
  # - 10.0.100.3
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/instance: adguard
    apps.kubernetes.io/pod-index: '10'
