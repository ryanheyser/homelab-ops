apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: network-system
spec:
  driftDetection:
    mode: enabled
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://traefik.github.io/charts datasource=helm
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
    crds: Skip
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: uninstall
    crds: Skip
    force: true
  uninstall:
    keepHistory: false
  values:
    global:
      checkNewVersion: true
      sendAnonymousUsage: false
      notAppendXForwardedFor: false
    deployment:
      kind: DaemonSet
      replicas: null
      # replicas: 5
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    # hostNetwork: true
    # securityContext:
    #   capabilities:
    #     add: ["NET_BIND_SERVICE"]
    #   sysctls:
    #     - name: "net.ipv4.ip_unprivileged_port_start"
    #       value: "0"
    #   privileged: true
    #   allowPrivilegeEscalation: true
    #   runAsUser: 0
    #   runAsGroup: 0
    #   fsGroup: 0
    #   runAsNonRoot: false
    logs:
      general:
        level: INFO
        format: json
      access:
        enabled: true
        format: json
    resources:
      requests:
        cpu: "500m"
        memory: "200Mi"
      limits:
        cpu: "1000m"
        memory: "400Mi"
    experimental:
      plugins:
        # enabled: true
        bouncer:
          moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
          # renovate: depName=maxlerebourg/crowdsec-bouncer-traefik-plugin datasource=github-releases
          version: 1.5.1
        real-ip:
          moduleName: github.com/Paxxs/traefik-get-real-ip
          version: v1.0.4
      kubernetesGateway:
        enabled: true
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        allowExternalNameServices: true
        allowEmptyServices: true
        nativeLBByDefault: true
        # ingressClass: traefik
      kubernetesIngress:
        allowExternalNameServices: true
        allowEmptyServices: true
        nativeLBByDefault: true
        publishedService:
          enabled: true
        # comment out ingressClass to allow all ingresses to be processed  
        # ingressClass: traefik 
      kubernetesGateway:
        enabled: true
        nativeLBByDefault: true
        experimentalChannel: true
    # nodeSelector:
    #   ingress-ready: 'true'
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    gateway:
      enabled: false
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
          - kind: Secret
            name: wildcard-homelab-heyser-xyz-tls
            namespace: network-system
          mode: Terminate
        # dns-tcp:
        #   port: 53
        #   protocol: TCP
        #   namespacePolicy:
        #     from: All
        # dns-udp:
        #   port: 53
        #   protocol: UDP
        #   namespacePolicy:
        #     from: All
        # dns-tls-tcp:
        #   port: 853
        #   protocol: TLS
        #   namespacePolicy:
        #     from: All
        #   tls:
        #     mode: Passthrough
        # dns-quic-udp:
        #   port: 784
        #   protocol: UDP
        #   namespacePolicy:
        #     from: All
    service:
      annotations:
        cni.projectcalico.org/ipAddrs: '["10.0.100.1"]'
        metallb.io/address-pool: "system"
        metallb.io/allow-shared-ip: "traefik-share"
        # metallb.io/loadBalancerIPs: &lbip 10.0.100.1
        metallb.io/loadBalancerIPs: 10.0.100.1
        # traefik.ingress.kubernetes.io/service.nativelb: "true"
      spec:
        # loadBalancerIP: 10.0.100.1
        # externalIPs:
        # - *lbip
        # externalTrafficPolicy: Cluster
        externalTrafficPolicy: Local
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
        - ipv6
        - ipv4
    ports:
      traefik:
        port: 9090
        containerPort: 9090
        hostPort: 9090
      websecure:
        port: 443
        containerPort: 443
        hostPort: 443
        asDefault: true
        allowACMEByPass: true
        forwardedHeaders:
          insecure: true
          trustedIPs: &trustedIPs
          - 10.0.0.0/18
          - 10.254.0.0/16
          - 10.255.0.0/16
        proxyProtocol:
          insecure: true
          trustedIPs: *trustedIPs
        http3:
          enabled: true
          advertisedPort: 443
      web:
        port: 80
        containerPort: 80
        hostPort: 80
        forwardedHeaders:
          insecure: true
          trustedIPs: *trustedIPs
        proxyProtocol:
          insecure: true
          trustedIPs: *trustedIPs
        # http:
        #   redirections:
        #     entryPoint:
        #       to: websecure
        #       scheme: https
        #       permanent: true
