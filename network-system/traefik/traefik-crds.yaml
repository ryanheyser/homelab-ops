apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-crds
  namespace: network-system
spec:
  driftDetection:
    mode: enabled
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://traefik.github.io/charts datasource=helm
      chart: traefik-crds
      version: 1.17.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 3
      strategy: uninstall
    crds: CreateReplace
    force: true
  uninstall:
    keepHistory: false
  values:
    enabled: true
    traefik: true
    gatewayAPI: false
    gatewayAPIExperimental: false
    knative: false
    hub: false
    deleteOnUninstall: false
