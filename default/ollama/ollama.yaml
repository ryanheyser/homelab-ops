    #     hostnames:
    #     - *host
    #     rules:
    #     - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /
    #       backendRefs:
    #       - kind: Service
    #         name: audiobookshelf
    #         port: *port
    #       timeouts:
    #         backendRequest: 10s
    #         request: 30s

    persistence:
      config:
        existingClaim: ollama-config
        advancedMounts:
          main:
            main:
            - path: "/app/data"
