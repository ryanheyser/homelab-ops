---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: truenas-storage-tailscale
  annotations:
    tailscale.com/experimental-forward-cluster-traffic-via-ingress: "true"
    tailscale.com/hostname: storage
    tailscale.com/proxy-group: ts-ingress-proxygroup
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: truenas-storage-ip
            port:
              name: truenas
  ingressClassName: tailscale
  tls:
    - hosts:
        - storage
---
