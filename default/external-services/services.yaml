---
apiVersion: v1
kind: Service
metadata:
  name: truenas-awoofy-ip
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: "https"
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
    # traefik.ingress.kubernetes.io/service.nativelb: "true"
    traefik.ingress.kubernetes.io/service.serverstransport: default-awoofytransport@kubernetescrd
    tailscale.com/expose: "true"
    tailscale.com/hostname: "awoofy"
    tailscale.com/proxy-group: ts-ingress-proxygroup
    tailscale.com/tags: "services"
spec:
  ports:
  - name: truenas
    port: 443
    protocol: TCP
    targetPort: 443
  # clusterIP: None
  # internalTrafficPolicy: Cluster
  # ipFamilies:
  # - IPv4
  # ipFamilyPolicy: SingleStack
  # type: ClusterIP
  type: ExternalName
  externalName: 10.0.0.8
---
