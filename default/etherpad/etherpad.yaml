apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etherpad
  namespace: default
spec:
  driftDetection:
    mode: enabled
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        defaultContainerOptions:
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 2Gi
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 3001
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups: [ 568, 911, 1000, 1001 ]
          tolerations:
          - key: "arm"
            operator: "Exists"
        containers:
          main:
            image:
              # renovate: repository=etherpad/etherpad
              repository: etherpad/etherpad
              tag: 2.7.2
            securityContext:
              runAsUser: 1000
              runAsGroup: 3001
            env:
              TZ: "America/New_York"
              NODE_ENV: production
            envFrom:
              - secretRef:
                  name: etherpad-config
                  optional: false
              - secretRef:
                  name: etherpad-database
                  optional: false
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9001
    ingress:
      main:
        className: 'traefik'
        annotations:
          kubernetes.io/ingress.class: traefik
          traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
          traefik.ingress.kubernetes.io/router.middlewares: "network-system-authentik@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: etherpad.svg
          gethomepage.dev/name: Etherpad
          gethomepage.dev/description: Etherpad is a real-time collaborative editor.
        hosts:
        - host: &host "etherpad.homelab.heyser.xyz"
          paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
        tls:
        - hosts:
          - *host
          secretName: etherpad-homelab-heyser-xyz-tls

    # route:
    #   main:
    #     enabled: true
    #     kind: HTTPRoute
    #     parentRefs:
    #     - group: gateway.networking.k8s.io
    #       kind: Gateway
    #       name: traefik-gateway
    #       namespace: network-system
    #     hostnames:
    #     - *host
    #     rules:
    #     - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /
    #       backendRefs:
    #       - kind: Service
    #         name: audiobookshelf
    #         port: *port
    #       timeouts:
    #         backendRequest: 10s
    #         request: 30s

    persistence:
      plugins:
        existingClaim: etherpad-plugins
        advancedMounts:
          main:
            main:
            - path: "/opt/etherpad-lite/src/plugin_packages"
      etherpad-var:
        existingClaim: etherpad-var
        advancedMounts:
          main:
            main:
            - path: "/opt/etherpad-lite/var"
