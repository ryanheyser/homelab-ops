apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
  namespace: default
spec:
  driftDetection:
    mode: enabled
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        defaultContainerOptions:
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 2Gi
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 0
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups: [ 568, 911, 1000, 1001, 3001 ]
          tolerations:
          - key: "arm"
            operator: "Exists"
        containers:
          main:
            image:
              # renovate: repository=ghcr.io/grimmory-tools/grimmory
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.3.1
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: true
              capabilities:
                add: [ "CAP_SETGID", "CAP_SETUID" ]
            env:
              TZ: America/New_York
              SWAGGER_ENABLED: "false"
              USER_ID: "1000"
              GROUP_ID: "3001"
            envFrom:
            - secretRef:
                name: grimmory-config
                optional: false
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 6060
            targetPort: 6060
    ingress:
      main:
        className: 'traefik'
        annotations:
          kubernetes.io/ingress.class: traefik
          traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
          # traefik.ingress.kubernetes.io/router.middlewares: "network-system-authentik@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: grimmory.svg
          gethomepage.dev/name: grimmory
          gethomepage.dev/description: grimmory is a self-hosted book management and reading application built with Node.js, Express, and React. It provides a user-friendly interface for organizing and reading your book collection, with features like multi-user support, reading progress tracking, and mobile device compatibility.
        hosts:
        - host: &host "grimmory.homelab.heyser.xyz"
          paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
        tls:
        - hosts:
          - *host
          secretName: grimmory-homelab-heyser-xyz-tls

    persistence:
      grimmory-data:
        existingClaim: grimmory-data
        advancedMounts:
          main:
            main:
            - path: "/app/data"
              readOnly: false
      grimmory-books:
        existingClaim: grimmory-books
        advancedMounts:
          main:
            main:
            - path: "/books"
              readOnly: false
      grimmory-bookdrop:
        existingClaim: grimmory-bookdrop
        advancedMounts:
          main:
            main:
            - path: "/bookdrop"
              readOnly: false
      # grimmory-nginx:
      #   type: emptyDir
      #   advancedMounts:
      #     main:
      #       main:
      #       - path: "/etc/nginx"
      #         readOnly: false
      grimmory-logs:
        type: emptyDir
        advancedMounts:
          main:
            main:
            - path: "/var/lib/nginx/logs"
              readOnly: false
