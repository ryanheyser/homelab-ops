---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: qbittorrent-vpn
spec:
  config: '{
      "plugins": [{
      "name": "vpnnet1",
      "type": "bridge",
      "bridge": "vpnbr",
      "ipam": {
          "type": "host-local",
          "ranges": [
            [{
              "subnet": "10.99.0.0/18",
              "rangeStart": "10.99.1.0",
              "rangeEnd": "10.99.1.9",
              "gateway": "10.99.0.1"
            }]
          ],
          "routes": [
            { "dst": "0.0.0.0/0" }
          ],
        }
      },{
        "type": "sbr"
      }]
    }'
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: seedbox-vpn
spec:
  config: '{
    "plugins": [{
      "name": "vpnnet1",
      "type": "bridge",
      "bridge": "vpnbr",
      "ipam": {
        "type": "dhcp"
        }
      },{
        "type": "sbr"
      }]
    }'
---
